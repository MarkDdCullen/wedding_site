<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Mark & Georgia's Wedding - RSVP, dinner menu, and photo sharing">
  <meta name="theme-color" content="#B76E79">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Mark & Georgia">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Mark & Georgia | Wedding</title>

  <style>
    body {
      margin: 0;
      background-color: #FFF5F0;
    }
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Georgia', serif;
      color: #B76E79;
    }
    .loading h1 {
      font-size: 36px;
      font-weight: 400;
      margin: 0 0 8px 0;
      letter-spacing: 2px;
      font-style: italic;
    }
    .spinner {
      margin-top: 24px;
      width: 24px;
      height: 24px;
      border: 2px solid #D4A0A7;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <h1>Mark & Georgia</h1>
    <div class="spinner"></div>
  </div>
  <script>
    // Restore path from 404 redirect
    (function(){
      var redirect = sessionStorage.redirect;
      delete sessionStorage.redirect;
      if (redirect && redirect !== '/' && redirect !== location.pathname) {
        history.replaceState(null, null, redirect);
      }
    })();

    // Unregister all service workers to prevent stale caching
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (var registration of registrations) {
          registration.unregister();
        }
      });
    }
    // Clear all caches
    if ('caches' in window) {
      caches.keys().then(function(names) {
        for (var name of names) {
          caches.delete(name);
        }
      });
    }

    window.addEventListener('flutter-first-frame', function () {
      var loading = document.getElementById('loading');
      if (loading) loading.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
